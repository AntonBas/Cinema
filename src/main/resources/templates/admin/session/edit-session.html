<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Session</title>
    <link rel="stylesheet" th:href="@{/css/admin/session-form.css}">
</head>
<body>
    <h2>Edit Session</h2>

    <form th:action="@{'/admin/session/edit/' + ${session.id}}" th:object="${session}" method="post">
        <input type="hidden" th:field="*{id}" />

        <label for="movie">Movie:</label>
        <select id="movie" th:field="*{movie.id}" required>
            <option th:each="movie : ${movies}"
                    th:value="${movie.id}"
                    th:text="${movie.title}"
                    th:selected="${movie.id} == ${session.movie.id}">
            </option>
        </select>
        <br/>

        <label for="hall">Hall:</label>
        <select id="hall" th:field="*{hall.id}" required>
            <option th:each="hall : ${halls}"
                    th:value="${hall.id}"
                    th:text="${hall.name}"
                    th:selected="${hall.id} == ${session.hall.id}">
            </option>
        </select>
        <br/>

        <label for="startTime">Start Time:</label>
        <input type="datetime-local" id="startTime" th:field="*{startTime}" required />
        <br/>

        <label for="endTime">End Time:</label>
        <input type="datetime-local" id="endTime" th:field="*{endTime}" required />
        <br/>

        <label for="price">Price (UAH):</label>
        <input type="number" id="price" th:field="*{price}" min="0" step="0.01" required />
        <br/>

        <button type="submit">Update Session</button>
        <a th:href="@{/admin/session}">Cancel</a>
    </form>
</body>
</html>
