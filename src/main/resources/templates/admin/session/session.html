<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Session List</title>
<link rel="stylesheet" th:href="@{/css/admin/session.css}">
</head>
<body>
	<h2>All Cinema Sessions</h2>

	<a th:href="@{/admin/session/create}">+ Create New Session</a>

	<table>
		<thead>
			<tr>
				<th>Movie</th>
				<th>Hall</th>
				<th>Start Time</th>
				<th>End Time</th>
				<th>Price</th>
				<th>Actions</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="sess : ${sessions}">
				<td th:text="${sess.movie.title}">Movie Title</td>
				<td th:text="${sess.hall.name}">Hall Name</td>
				<td
					th:text="${#temporals.format(sess.startTime, 'yyyy-MM-dd HH:mm')}">Start</td>
				<td th:text="${#temporals.format(sess.endTime, 'yyyy-MM-dd HH:mm')}">End</td>
				<td th:text="|${sess.price} UAH|">100.00</td>
				<td><a th:href="@{/admin/session/edit/{id}(id=${sess.id})}">Edit</a>
					|
					<form th:action="@{/admin/session/delete/{id}(id=${sess.id})}"
						method="post" style="display: inline;">
						<button type="submit" onclick="return confirm('Are you sure?')">Delete</button>
					</form></td>
			</tr>
		</tbody>
	</table>

	<a th:href="@{/admin/dashboard}">← Back to Admin Panel</a>
</body>
</html>
