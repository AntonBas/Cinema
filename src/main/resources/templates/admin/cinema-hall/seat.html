<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="'Hall: ' + ${hall.name}">Cinema</title>
    <link rel="stylesheet" th:href="@{/css/reset.css}">
    <link rel="stylesheet" th:href="@{/css/admin/cinema-hall/seat.css}">
    <th:block th:insert="~{common/header :: header-styles}" />
</head>
<body>
    <header th:replace="~{common/header :: cinema-header}"></header>
    <main class="cinema-hall-view">
        <div class="hall-header">
            <h2 th:text="'Seats in: ' + ${hall.name}"></h2>
            <div class="cinema-screen">SCREEN</div>
        </div>

        <div class="seats-container">
            <div class="seat-rows">
                <div class="seat-row" th:each="row : ${#numbers.sequence(1, totalRows)}">
                    <div class="row-number" th:text="${row}"></div>
                    <div class="row-seats">
                        <a th:each="seat : ${seats}"
                           th:if="${seat.rowNumber == row}"
                           th:href="@{'/admin/seat/edit/' + ${seat.id}}"
                           th:class="'seat ' + (${seat.vip} ? 'vip' : 'regular')"
                           th:text="${seat.seatNumber}"
                           th:title="'Row ' + ${seat.rowNumber} + ', Seat ' + ${seat.seatNumber} + (${seat.vip} ? ' (VIP)' : '')">
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="hall-footer">
            <div class="seat-legend">
                <div class="legend-item">
                    <div class="seat-sample regular"></div>
                    <span>Regular Seat</span>
                </div>
                <div class="legend-item">
                    <div class="seat-sample vip"></div>
                    <span>VIP Seat</span>
                </div>
            </div>

            <a th:href="@{/admin/seat/create}" class="back-button">+ Create seat</a>
            <a th:href="@{/admin/hall}" class="back-button">← Back to halls list</a>
        </div>
    </main>
</body>
</html>
