<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Create Cinema Hall | Cinema Admin</title>
<link rel="stylesheet" th:href="@{/css/reset.css}">
<link rel="stylesheet" th:href="@{/css/admin/cinema-hall/hall-form.css}">
<th:block th:insert="~{common/header :: header-styles}" />
</head>
<body>
	<header th:replace="~{common/header :: cinema-header}"></header>
	<h1>Create New Cinema Hall</h1>

	<form th:action="@{/admin/hall/create}" th:object="${hallForm}"
		method="post">
		<div>
			<label>Hall Name:</label> <input type="text" th:field="*{name}"
				required> <span th:if="${#fields.hasErrors('name')}"
				th:errors="*{name}"></span>
		</div>

		<div>
			<label>Number of Rows:</label> <input type="number"
				th:field="*{rows}" min="1" required> <span
				th:if="${#fields.hasErrors('rows')}" th:errors="*{rows}"></span>
		</div>

		<div>
			<label>Seats per Row:</label> <input type="number"
				th:field="*{seatsPerRow}" min="1" required> <span
				th:if="${#fields.hasErrors('seatsPerRow')}"
				th:errors="*{seatsPerRow}"></span>
		</div>
		<div class="form-action">
			<button type="submit">Create Hall with Seats</button>
			<a th:href="@{/admin/hall}" class="cancel-btn">Cancel</a>
		</div>
	</form>
</body>
</html>
