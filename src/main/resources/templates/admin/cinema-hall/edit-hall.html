<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Session</title>
    <link rel="stylesheet" th:href="@{/css/admin/session.css}">
</head>
<body>
    <h2>Edit Cinema Session</h2>

    <form th:action="@{/admin/session/edit/{id}(id=${session.id})}" th:object="${session}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div>
            <label>Movie:</label>
            <select th:field="*{movie.id}">
                <option th:each="movie : ${movies}" th:value="${movie.id}" th:text="${movie.title}"></option>
            </select>
        </div>

        <div>
            <label>Hall:</label>
            <select th:field="*{hall.id}">
                <option th:each="hall : ${halls}" th:value="${hall.id}" th:text="${hall.name}"></option>
            </select>
        </div>

        <div>
            <label>Start Time:</label>
            <input type="datetime-local" th:field="*{startTime}" />
        </div>

        <div>
            <label>End Time:</label>
            <input type="datetime-local" th:field="*{endTime}" />
        </div>

        <div>
            <label>Price (UAH):</label>
            <input type="number" step="0.01" min="0" th:field="*{price}" />
        </div>

        <div>
            <button type="submit">Update</button>
            <a th:href="@{/admin/session}">Cancel</a>
        </div>
    </form>
</body>
</html>
