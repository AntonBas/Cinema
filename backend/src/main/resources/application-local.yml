spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:cinema_db}
    username: ${DB_USER:cinema}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 3

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

logging:
  level:
    ua.lviv.bas.cinema: DEBUG
    org.springframework.web: DEBUG