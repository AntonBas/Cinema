spring:
    config:
        activate:
            on-profile: local
    datasource:
        url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:cinema_db}
        username: ${DB_USER:cinema}
        password: ${DB_PASSWORD:}
        hikari:
            maximum-pool-size: 3
    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: true
        properties:
            hibernate:
                "[format_sql]": true
    flyway:
        enabled: true
    task:
        execution:
            pool:
                core-size: 2
                max-size: 4
                queue-capacity: 50
            thread-name-prefix: "scheduler-"

scheduler:
    birthday-bonus:
        cron: "0 */30 * * * *"
    email-token:
        cleanup-expired-cron: "0 */5 * * * *"
        cleanup-confirmed-cron: "0 0 * * * *"
    movie-status:
        cron: "0 */10 * * * *"
    session-status:
        cron: "0 */1 * * * *"
    booking:
        expiration-interval: 30000
        cleanup-cron: "0 */30 * * * *"
        reminder-cron: "0 */5 * * * *"

logging:
    level:
        "[ua.lviv.bas.cinema]": DEBUG
        "[org.springframework.web]": DEBUG
        "[ua.lviv.bas.cinema.scheduler]": INFO
