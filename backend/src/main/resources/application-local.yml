spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:cinema_local}
    username: ${DB_USER:local_user}
    password: ${DB_PASSWORD:local_pass}
    hikari:
      maximum-pool-size: 3
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false

logging:
  level:
    org.springframework: DEBUG
    com.cinema: TRACE

app:
  jwt:
    secret: ${JWT_SECRET:dev_local_only_change_in_production}
    expiration: 2592000000