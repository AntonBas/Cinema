spring:
    config:
        activate:
            on-profile: docker

    datasource:
        url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:cinema_db}
        hikari:
            maximum-pool-size: 10

    jpa:
        show-sql: false
        properties:
            hibernate:
                "[jdbc.batch_size]": 20
                "[jdbc.fetch_size]": 50
                "[order_inserts]": true
                "[order_updates]": true

    task:
        execution:
            pool:
                core-size: 5
                max-size: 10
                queue-capacity: 100

scheduler:
    booking:
        expiration-interval: 30000

logging:
    level:
        "[ua.lviv.bas.cinema]": INFO
        "[org.springframework]": WARN
