<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Edit Seat | Cinema Admin</title>
<link rel="stylesheet" th:href="@{/css/reset.css}">
<link rel="stylesheet" th:href="@{/css/admin/cinema-hall/edit-seat.css}">
<th:block th:insert="~{common/header :: header-styles}" />
</head>
<body>
	<!--     <header th:replace="~{common/header :: cinema-header}"></header>
 -->
	<h1>Edit Seat</h1>

	<form th:action="@{'/admin/seat/edit/' + ${seat.id}}"
		th:object="${seat}" method="post">

		<div>
			<label>Hall Name:</label> <span th:text="${seat.hall.name}">Hall</span>
		</div>

		<div>
			<label for="rowNumber">Row Number:</label> <input type="number"
				id="rowNumber" th:field="*{rowNumber}" min="1" required /> <span
				th:if="${#fields.hasErrors('rowNumber')}" th:errors="*{rowNumber}"></span>
		</div>

		<div>
			<label for="seatNumber">Seat Number:</label> <input type="number"
				id="seatNumber" th:field="*{seatNumber}" min="1" required /> <span
				th:if="${#fields.hasErrors('seatNumber')}" th:errors="*{seatNumber}"></span>
		</div>

		<div>
			<label> <input type="checkbox" th:field="*{vip}" /> VIP Seat
			</label>
		</div>

		<div class="form-actions">
			<button type="submit">Save</button>
			<a th:href="@{'/admin/seat/hall/' + ${seat.hall.id}}"
				class="cancel-btn">Cancel</a>
		</div>
	</form>
	<form th:action="@{'/admin/seat/delete/' + ${seat.id}}" method="post"
		onsubmit="return confirm('Delete this seat?');">
		<button type="submit" class="delete-btn">Delete Seat</button>
	</form>
</body>
</html>
