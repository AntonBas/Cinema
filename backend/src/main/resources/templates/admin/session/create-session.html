<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Session</title>
    <link rel="stylesheet" th:href="@{/css/reset.css}">
    <link rel="stylesheet" th:href="@{/css/admin/session/form.css}">
    <th:block th:insert="~{common/header :: header-styles}" />
</head>
<body>
<!-- <header th:replace="~{common/header :: cinema-header}"></header>
 -->
<main class="create-session-form">
    <h2>Create New Session</h2>

    <div th:if="${errorMessage}" style="color: red; margin-bottom: 1em;">
        <p th:text="${errorMessage}"></p>
    </div>

    <form th:action="@{/admin/session/create}" th:object="${session}" method="post">
        <div>
            <label for="movie">Movie:</label>
            <select id="movie" th:field="*{movie.id}" required>
                <option value="" disabled selected>Select a movie</option>
                <option th:each="movie : ${movies}" th:value="${movie.id}" th:text="${movie.title}"></option>
            </select>
        </div>

        <div>
            <label for="hall">Hall:</label>
            <select id="hall" th:field="*{hall.id}" required>
                <option value="" disabled selected>Select a hall</option>
                <option th:each="hall : ${halls}" th:value="${hall.id}" th:text="${hall.name}"></option>
            </select>
        </div>

        <div>
            <label for="startTime">Start Time:</label>
            <input type="datetime-local" id="startTime" th:field="*{startTime}" required />
        </div>

        <div>
            <label for="price">Price:</label>
            <input type="number" id="price" th:field="*{price}" step="0.01" min="0" required />
        </div>

        <div class="form-actions">
            <button type="submit">Create Session</button>
            <a th:href="@{/admin/session}" class="back-button">← Back</a>
        </div>
    </form>
</main>

</body>
</html>
